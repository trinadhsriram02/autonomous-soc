version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./src/data:/app/src/data
    command: python -m src.api.main

  dashboard:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./src/data:/app/src/data
    command: streamlit run dashboard.py --server.port 8501
    depends_on:
      - api